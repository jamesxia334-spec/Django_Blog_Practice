{% extends "blogs/base.html" %}

{% block content %}
  <p><a href="{% url 'blogs:blog' blog.id %}">{{ blog.title }}</a></p>

  <p>Edit post:</p>

  <form action="{% url 'blogs:edit_blog_post' post.id %}" method='post'>
    {% csrf_token %}
    {{ form.as_p }}
    <button name="submit">Save changes</button>
  </form>
{% endblock content %}
