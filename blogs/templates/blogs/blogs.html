{% extends "blogs/base.html" %}

{% block content %}
<p>Blogs</p>
<a href="{% url 'blogs:new_blog' %}">Add a new blog</a>
<ul>
  {% for blog in blogs %}
  <li>
    <a href="{% url 'blogs:blog' blog.id %}">{{ blog.title }}</a>
  </li>
  {% empty %}
  <li>No blogs have been added yet.</li>
  {% endfor %}
</ul>


{% endblock content %}
