{% extends "blogs/base.html" %}

{% block content %}
<p>Blogs</p>
<a href="{% url 'blogs:new_blog' %}">Add a new blog</a>
<ul>
  {% for blog in blogs %}
  <li>
    <a href="{% url 'blogs:blog' blog.id %}">{{ blog.title }}</a>
    <a href="{% url 'blogs:edit_blog' blog.id %}" style="margin-left: 20px; font-size: 1.0em; color: blue;">(Edit blog title)</a>
    <a href="#" onclick="if(prompt('Warning! This will delete the blog and ALL related posts. Type \'DELETE\' to confirm:') === 'DELETE') { document.getElementById('delete-blog-{{ blog.id }}').submit(); } return false;" style="margin-left: 20px; font-size: 1.0em; color: red;">Delete Blog</a>
    <form id="delete-blog-{{ blog.id }}" action="{% url 'blogs:delete_blog' blog.id %}" method="post" style="display: none;">{% csrf_token %}</form>
  </li>
  {% empty %}
  <li>No blogs have been added yet.</li>
  {% endfor %}
</ul>


{% endblock content %}
